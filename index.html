<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TaskFlow Pro | Final Polished Version</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: radial-gradient(circle at 10% 30%, #f0f4ff, #e6edfa);
      background-attachment: fixed;
      transition: background 0.5s ease;
    }
    body:hover {
      background: radial-gradient(circle at 20% 40%, #eef2ff, #dfe6f5);
    }
    .glass-panel {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.5);
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.35s ease;
      transform-style: preserve-3d;
    }
    .glass-panel:hover {
      transform: translateY(-6px) rotateX(2deg);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
    }
    .fade-in { animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) rotateX(-5deg); } to { opacity:1; transform:translateY(0) rotateX(0); } }
    .stats-card {
      background: white;
      border-radius: 1rem;
      padding: 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid #eef2ff;
      transform: translateZ(0);
    }
    .stats-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
    }
    .stats-card.active { background: #eef2ff; border-color: #6366f1; transform: scale(1.02); }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #eef2ff; } ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    .company-logo { max-width: 60px; max-height: 60px; object-fit: contain; border-radius: 0.5rem; transition: transform 0.2s; }
    .company-logo:hover { transform: scale(1.05) rotate(1deg); }
    .role-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      transform-style: preserve-3d;
    }
    .role-card:hover {
      transform: translateY(-8px) rotateX(3deg);
      box-shadow: 0 25px 30px -12px rgba(0,0,0,0.2);
    }
    button, .btn {
      transition: transform 0.15s ease, background 0.2s;
    }
    button:active { transform: scale(0.97); }
    input, textarea, select { transition: all 0.2s; }
    input:focus, textarea:focus, select:focus {
      box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
      border-color: #6366f1;
      outline: none;
      transform: scale(0.99);
    }
    .settings-btn:hover i {
      animation: gentlePulse 0.5s ease;
    }
    @keyframes gentlePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .data-row {
      transition: all 0.2s;
    }
    .data-row:hover {
      background: #f8fafc;
      transform: translateX(3px);
    }
  </style>
</head>
<body class="min-h-screen p-5 md:p-8">
<div id="appRoot" class="max-w-7xl mx-auto"></div>

<script>
  // ======================= STORAGE KEYS =======================
  const STORAGE_COMPANIES = "taskflow_companies";
  const STORAGE_EMPLOYEES_PREFIX = "taskflow_employees_";
  const STORAGE_TASKS_PREFIX = "taskflow_tasks_";
  const SESSION_USER = "taskflow_logged_user";
  const SUPER_CREDENTIALS = "taskflow_super_creds";

  let companies = [];
  let currentCompanyId = null;
  let employees = [];
  let tasks = [];
  let currentUser = null;
  let loginRole = null;

  let SUPER_EMAIL = "super@taskflow.com";
  let SUPER_PASSWORD = "super123";

  function loadSuperCredentials() {
    const stored = localStorage.getItem(SUPER_CREDENTIALS);
    if (stored) {
      const creds = JSON.parse(stored);
      SUPER_EMAIL = creds.email;
      SUPER_PASSWORD = creds.password;
    } else {
      localStorage.setItem(SUPER_CREDENTIALS, JSON.stringify({ email: SUPER_EMAIL, password: SUPER_PASSWORD }));
    }
  }
  function saveSuperCredentials(email, password) {
    SUPER_EMAIL = email;
    SUPER_PASSWORD = password;
    localStorage.setItem(SUPER_CREDENTIALS, JSON.stringify({ email: SUPER_EMAIL, password: SUPER_PASSWORD }));
  }

  const generateId = () => Date.now() + '-' + Math.random().toString(36).substr(2, 9);

  // ------------------------- DATA LOAD / SAVE -------------------------
  function loadCompanies() {
    const stored = localStorage.getItem(STORAGE_COMPANIES);
    companies = stored ? JSON.parse(stored) : [];
    if (!companies.length) {
      companies.push({ 
        id: generateId(), 
        name: "Demo Corp", 
        email: "demo@democorp.com", 
        logoDataURL: "https://placehold.co/200x80?text=Demo+Corp", 
        address: "123 Business Street",
        password: "demo123"
      });
      saveCompanies();
    }
  }
  function saveCompanies() { localStorage.setItem(STORAGE_COMPANIES, JSON.stringify(companies)); }

  function loadCompanyData(companyId) {
    const empKey = STORAGE_EMPLOYEES_PREFIX + companyId;
    const taskKey = STORAGE_TASKS_PREFIX + companyId;
    employees = JSON.parse(localStorage.getItem(empKey) || '[]');
    tasks = JSON.parse(localStorage.getItem(taskKey) || '[]');
    if (!employees.length && companies.find(c => c.id === companyId)) {
      const admin = { id: generateId(), name: "Admin", email: "admin@company.com", password: "admin123", role: "admin", designation: "Company Administrator", whatsapp: "" };
      const emp = { id: generateId(), name: "Employee", email: "employee@company.com", password: "emp123", role: "employee", designation: "Software Developer", whatsapp: "923001234567" };
      employees.push(admin, emp);
      const today = new Date().toISOString().slice(0,10);
      tasks.push({ id: generateId(), employeeId: emp.id, date: today, taskText: "Welcome task – get started", status: "present" });
      saveCompanyData(companyId);
    }
  }
  function saveCompanyData(companyId) {
    localStorage.setItem(STORAGE_EMPLOYEES_PREFIX + companyId, JSON.stringify(employees));
    localStorage.setItem(STORAGE_TASKS_PREFIX + companyId, JSON.stringify(tasks));
  }

  function setCurrentCompany(companyId) {
    currentCompanyId = companyId;
    loadCompanyData(companyId);
  }

  // ------------------------- SESSION -------------------------
  function setSession(user, companyId = null) {
    currentUser = user;
    if (user) {
      const sessionData = { user, companyId: companyId || currentCompanyId };
      sessionStorage.setItem(SESSION_USER, JSON.stringify(sessionData));
      if (companyId) setCurrentCompany(companyId);
    } else {
      sessionStorage.removeItem(SESSION_USER);
      currentCompanyId = null;
      currentUser = null;
    }
  }

  function loadSession() {
    const raw = sessionStorage.getItem(SESSION_USER);
    if (raw) {
      try {
        const { user, companyId } = JSON.parse(raw);
        if (companyId && companies.find(c => c.id === companyId)) {
          currentCompanyId = companyId;
          loadCompanyData(companyId);
          if (employees.find(e => e.id === user.id)) currentUser = user;
          else currentUser = null;
        } else currentUser = null;
      } catch(e) { currentUser = null; }
    } else currentUser = null;
  }

  // ------------------------- LOGIN (3 roles) -------------------------
  function loginSuper(email, password) {
    if (email === SUPER_EMAIL && password === SUPER_PASSWORD) {
      setSession({ id: "super", name: "System Owner", email: SUPER_EMAIL, role: "super" }, null);
      renderApp();
      return true;
    }
    return false;
  }

  function loginCompanyAdmin(companyEmail, companyPassword) {
    const company = companies.find(c => c.email === companyEmail);
    if (!company) return false;
    if (company.password !== companyPassword) return false;
    setCurrentCompany(company.id);
    let adminUser = employees.find(e => e.role === "admin");
    if (!adminUser) {
      adminUser = { id: generateId(), name: "Company Admin", email: companyEmail, password: companyPassword, role: "admin", designation: "Company Administrator", whatsapp: "" };
      employees.push(adminUser);
      saveCompanyData(company.id);
    }
    setSession(adminUser, company.id);
    return true;
  }

  function loginEmployee(companyEmail, email, password) {
    const company = companies.find(c => c.email === companyEmail);
    if (!company) return false;
    setCurrentCompany(company.id);
    const user = employees.find(e => e.email === email && e.password === password && e.role === "employee");
    if (user) {
      setSession(user, company.id);
      return true;
    }
    return false;
  }

  function logout() { setSession(null); renderApp(); }

  window.handleSuperLogin = function() {
    const email = document.getElementById("superEmail").value;
    const pwd = document.getElementById("superPassword").value;
    if (loginSuper(email, pwd)) { loginRole = null; renderApp(); }
    else alert("Invalid super admin credentials");
  };
  window.handleCompanyAdminLogin = function() {
    const email = document.getElementById("compAdminEmail").value;
    const pwd = document.getElementById("compAdminPassword").value;
    if (loginCompanyAdmin(email, pwd)) { loginRole = null; renderApp(); }
    else alert("Invalid company credentials");
  };
  window.handleEmployeeLogin = function() {
    const companyEmail = document.getElementById("empCompanyEmail").value;
    const email = document.getElementById("empEmail").value;
    const pwd = document.getElementById("empPassword").value;
    if (loginEmployee(companyEmail, email, pwd)) { loginRole = null; renderApp(); }
    else alert("Invalid employee credentials");
  };
  window.goBackToRoleSelect = function() {
    loginRole = null;
    renderApp();
  };
  window.openWhatsApp = function(number) {
    if (!number) { alert("No WhatsApp number"); return; }
    let clean = number.replace(/\D/g, '');
    if (clean.startsWith('0')) clean = clean.substring(1);
    window.open(`https://wa.me/${clean}`, '_blank');
  };

  // ------------------------- PROFILE SETTINGS (fixed) -------------------------
  window.showProfileSettings = function() {
    const isAdmin = currentUser.role === "admin";
    const designationField = isAdmin ? '' : `
      <div>
        <label class="block text-sm font-medium mb-1">Designation</label>
        <input type="text" id="editDesignation" placeholder="e.g., Web Developer" class="w-full border rounded-xl px-3 py-2" value="${(currentUser.designation || '').replace(/</g, '&lt;')}">
      </div>
    `;
    const modalHtml = `
      <div id="profileModal" class="fixed inset-0 flex items-center justify-center z-50 bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl transform transition-all duration-300">
          <h3 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-user-cog text-indigo-600"></i> Edit Profile</h3>
          <div class="space-y-3">
            <div><label class="block text-sm font-medium mb-1">Full Name</label><input type="text" id="editName" class="w-full border rounded-xl px-3 py-2" value="${currentUser.name.replace(/</g, '&lt;')}"></div>
            <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" id="editEmail" class="w-full border rounded-xl px-3 py-2" value="${currentUser.email}"></div>
            <div><label class="block text-sm font-medium mb-1">New Password (leave blank to keep unchanged)</label><input type="password" id="editPassword" class="w-full border rounded-xl px-3 py-2"></div>
            ${designationField}
            <div class="flex justify-end gap-3 mt-4">
              <button type="button" id="closeProfileModal" class="px-4 py-2 border rounded-xl hover:bg-gray-50">Cancel</button>
              <button type="button" id="saveProfileBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    `;
    const container = document.getElementById("modalContainer");
    container.innerHTML = modalHtml;
    const closeModal = () => container.innerHTML = '';
    document.getElementById("closeProfileModal")?.addEventListener("click", closeModal);
    document.getElementById("saveProfileBtn")?.addEventListener("click", () => {
      const newName = document.getElementById("editName").value.trim();
      const newEmail = document.getElementById("editEmail").value.trim();
      const newPassword = document.getElementById("editPassword").value;
      const newDesignation = isAdmin ? null : document.getElementById("editDesignation")?.value.trim();
      if (!newName || !newEmail) { alert("Name and email are required"); return; }
      const userIndex = employees.findIndex(e => e.id === currentUser.id);
      if (userIndex !== -1) {
        employees[userIndex].name = newName;
        employees[userIndex].email = newEmail;
        if (newPassword) employees[userIndex].password = newPassword;
        if (!isAdmin && newDesignation) employees[userIndex].designation = newDesignation;
        saveCompanyData(currentCompanyId);
        currentUser.name = newName;
        currentUser.email = newEmail;
        if (newPassword) currentUser.password = newPassword;
        if (!isAdmin && newDesignation) currentUser.designation = newDesignation;
        setSession(currentUser, currentCompanyId);
        alert("Profile updated successfully!");
        closeModal();
        renderApp();
      } else {
        alert("User not found in company records");
      }
    });
    document.getElementById("profileModal")?.addEventListener("click", (e) => { if(e.target === document.getElementById("profileModal")) closeModal(); });
  };

  // ------------------------- BROADCAST WHATSAPP MODAL -------------------------
  window.showBroadcastModal = function() {
    const empList = employees.filter(e => e.whatsapp && e.whatsapp.trim() !== "" && e.id !== currentUser.id);
    if (empList.length === 0) {
      alert("No employees with WhatsApp numbers found.");
      return;
    }
    const modalHtml = `
      <div id="broadcastModal" class="fixed inset-0 flex items-center justify-center z-50 bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto shadow-2xl">
          <h3 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fab fa-whatsapp text-green-600"></i> Broadcast WhatsApp</h3>
          <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Your Message:</label>
            <textarea id="broadcastMsg" rows="3" class="w-full border rounded-xl px-3 py-2" placeholder="Type your message here..."></textarea>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Select recipients:</label>
            <div class="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto border rounded-xl p-2">
              ${empList.map(emp => `
                <label class="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer">
                  <input type="checkbox" class="recipientCheckbox" value="${emp.whatsapp}" data-name="${emp.name}">
                  <span><i class="fab fa-whatsapp text-green-600"></i> ${emp.name} (${emp.whatsapp})</span>
                </label>
              `).join('')}
            </div>
            <div class="mt-2">
              <button id="selectAllBtn" class="text-sm text-indigo-600 hover:underline">Select All</button>
              <button id="deselectAllBtn" class="text-sm text-gray-500 hover:underline ml-2">Deselect All</button>
            </div>
          </div>
          <div class="flex justify-end gap-3">
            <button type="button" id="closeBroadcastModal" class="px-4 py-2 border rounded-xl">Cancel</button>
            <button type="button" id="sendBroadcastBtn" class="px-4 py-2 bg-green-600 text-white rounded-xl"><i class="fab fa-whatsapp"></i> Send to Selected</button>
          </div>
          <p class="text-xs text-gray-500 mt-3">⚠️ This will open a new WhatsApp chat window for each selected recipient. Please allow pop‑ups.</p>
        </div>
      </div>
    `;
    const container = document.getElementById("modalContainer");
    container.innerHTML = modalHtml;
    const close = () => container.innerHTML = '';
    document.getElementById("closeBroadcastModal")?.addEventListener("click", close);
    document.getElementById("selectAllBtn")?.addEventListener("click", () => {
      document.querySelectorAll(".recipientCheckbox").forEach(cb => cb.checked = true);
    });
    document.getElementById("deselectAllBtn")?.addEventListener("click", () => {
      document.querySelectorAll(".recipientCheckbox").forEach(cb => cb.checked = false);
    });
    document.getElementById("sendBroadcastBtn")?.addEventListener("click", () => {
      const message = document.getElementById("broadcastMsg").value.trim();
      if (!message) { alert("Please enter a message"); return; }
      const selected = Array.from(document.querySelectorAll(".recipientCheckbox:checked")).map(cb => cb.value);
      if (selected.length === 0) { alert("Select at least one recipient"); return; }
      const encodedMsg = encodeURIComponent(message);
      for (let number of selected) {
        let clean = number.replace(/\D/g, '');
        if (clean.startsWith('0')) clean = clean.substring(1);
        window.open(`https://wa.me/${clean}?text=${encodedMsg}`, '_blank');
      }
      close();
      alert(`Message sent to ${selected.length} employee(s) – WhatsApp tabs opened.`);
    });
    document.getElementById("broadcastModal")?.addEventListener("click", (e) => { if(e.target === document.getElementById("broadcastModal")) close(); });
  };

  // ------------------------- OWNER -------------------------
  function addCompany(name, email, logoURL, address, password) {
    if (!name) { alert("Company name required"); return false; }
    if (!email) { alert("Company email required"); return false; }
    if (!password) { alert("Company password required"); return false; }
    companies.push({ 
      id: generateId(), 
      name: name.trim(), 
      email: email.trim(), 
      logoDataURL: logoURL || "https://placehold.co/200x80?text=Logo", 
      address: address || "",
      password: password
    });
    saveCompanies();
    renderApp();
    return true;
  }
  function deleteCompany(companyId) {
    if (confirm("Delete company and ALL its data?")) {
      companies = companies.filter(c => c.id !== companyId);
      localStorage.removeItem(STORAGE_EMPLOYEES_PREFIX + companyId);
      localStorage.removeItem(STORAGE_TASKS_PREFIX + companyId);
      saveCompanies();
      if (currentCompanyId === companyId) currentCompanyId = null;
      renderApp();
    }
  }

  function exportAllCompaniesToExcel() {
    const allCompaniesData = companies.map(c => ({
      "Company ID": c.id,
      "Company Name": c.name,
      "Company Email": c.email,
      "Company Password": c.password,
      "Address": c.address,
      "Logo URL": c.logoDataURL
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allCompaniesData), "Companies");
    XLSX.writeFile(wb, `All_Companies_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  // ------------------------- COMPANY ADMIN -------------------------
  function addEmployee(name, email, password, role, designation, whatsapp) {
    if (!name || !email || !password) return alert("All fields required");
    if (employees.find(e => e.email === email)) return alert("Email already exists in this company");
    employees.push({ 
      id: generateId(), 
      name: name.trim(), 
      email: email.trim(), 
      password: password, 
      role: role === "admin" ? "admin" : "employee",
      designation: designation || (role === "admin" ? "Company Administrator" : "Staff"),
      whatsapp: whatsapp || ""
    });
    saveCompanyData(currentCompanyId);
    renderApp();
  }
  function deleteEmployee(empId) {
    if (currentUser && currentUser.id === empId) { alert("Cannot delete self"); return; }
    employees = employees.filter(e => e.id !== empId);
    tasks = tasks.filter(t => t.employeeId !== empId);
    saveCompanyData(currentCompanyId);
    renderApp();
  }

  // ------------------------- TASKS -------------------------
  function getEmployeeTasks(empId) { return tasks.filter(t => t.employeeId === empId).sort((a,b) => b.date.localeCompare(a.date)); }
  function getTasksByDate(date) {
    return tasks.filter(t => t.date === date).map(t => {
      const emp = employees.find(e => e.id === t.employeeId);
      return { ...t, employeeName: emp ? emp.name : "Deleted" };
    });
  }
  function saveOrUpdateTask(employeeId, date, taskText, status) {
    const idx = tasks.findIndex(t => t.employeeId === employeeId && t.date === date);
    if (idx !== -1) { tasks[idx].taskText = taskText; tasks[idx].status = status; }
    else { tasks.push({ id: generateId(), employeeId, date, taskText, status }); }
    saveCompanyData(currentCompanyId);
    renderApp();
  }

  function exportCompanyToExcel() {
    const company = companies.find(c => c.id === currentCompanyId);
    const empData = employees.map(e => ({ 
      ID: e.id, "Full Name": e.name, Email: e.email, Role: e.role, 
      Designation: e.designation, WhatsApp: e.whatsapp, Password: e.password 
    }));
    const tasksData = tasks.map(t => {
      const emp = employees.find(e => e.id === t.employeeId);
      return { Employee: emp ? emp.name : "Deleted", Date: t.date, Task: t.taskText, Status: t.status === "leave" ? "Leave / Absent" : "Present" };
    });
    const companyInfo = [{ "Company Name": company?.name, "Company Email": company?.email, "Logo URL": company?.logoDataURL, "Address": company?.address }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(companyInfo), "Company");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(empData), "Employees");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tasksData), "Tasks");
    XLSX.writeFile(wb, `TaskFlow_${company?.name || "Company"}_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  // ------------------------- RENDER LOGIN -------------------------
  function renderLoginScreen() {
    if (!loginRole) {
      return `
        <div class="max-w-5xl mx-auto mt-12">
          <div class="text-center mb-8"><i class="fas fa-tasks text-5xl text-indigo-600"></i><h1 class="text-3xl font-bold mt-2">TaskFlow Pro</h1><p class="text-gray-500">Multi‑Role Task Management</p></div>
          <div class="grid md:grid-cols-3 gap-6">
            <div class="glass-panel rounded-3xl p-6 text-center role-card" data-role="super">
              <i class="fas fa-crown text-4xl text-amber-500"></i><h2 class="text-2xl font-bold mt-2">Super Admin</h2><p class="text-gray-500 text-sm">Owner · Create companies</p>
            </div>
            <div class="glass-panel rounded-3xl p-6 text-center role-card" data-role="companyAdmin">
              <i class="fas fa-building text-4xl text-indigo-500"></i><h2 class="text-2xl font-bold mt-2">Company Admin</h2><p class="text-gray-500 text-sm">Manage your company</p>
            </div>
            <div class="glass-panel rounded-3xl p-6 text-center role-card" data-role="employee">
              <i class="fas fa-user-check text-4xl text-emerald-500"></i><h2 class="text-2xl font-bold mt-2">Employee</h2><p class="text-gray-500 text-sm">Daily tasks</p>
            </div>
          </div>
        </div>
      `;
    } else if (loginRole === 'super') {
      return `
        <div class="max-w-md mx-auto mt-16 glass-panel rounded-3xl p-8 fade-in">
          <div class="text-center mb-6"><i class="fas fa-crown text-4xl text-amber-500"></i><h2 class="text-2xl font-bold mt-2">Super Admin Login</h2></div>
          <div class="space-y-4">
            <input type="email" id="superEmail" placeholder="Email" class="w-full border rounded-xl px-3 py-2">
            <input type="password" id="superPassword" placeholder="Password" class="w-full border rounded-xl px-3 py-2">
            <button onclick="handleSuperLogin()" class="w-full bg-indigo-600 text-white py-2 rounded-xl">Login</button>
            <button onclick="goBackToRoleSelect()" class="w-full text-xs underline mt-2">← Back</button>
          </div>
        </div>
      `;
    } else if (loginRole === 'companyAdmin') {
      return `
        <div class="max-w-md mx-auto mt-16 glass-panel rounded-3xl p-8 fade-in">

    const dayTasks = getTasksByDate(adminSelectedDate);
    if (adminTaskFilter === 'all') return employees;
    if (adminTaskFilter === 'submitted') return employees.filter(e => dayTasks.some(t => t.employeeId === e.id));
    if (adminTaskFilter === 'pending') return employees.filter(e => !dayTasks.some(t => t.employeeId === e.id));
    if (adminTaskFilter === 'inprogress') return employees.filter(e => { const t = dayTasks.find(d => d.employeeId === e.id); return t && t.status === 'present'; });
    return employees;
  }

  // ------------------------- EMPLOYEE DASHBOARD -------------------------
  function renderEmployeeDashboard() {
    const company = companies.find(c => c.id === currentCompanyId);
    const today = new Date().toISOString().slice(0,10);
    const myTasks = getEmployeeTasks(currentUser.id);
    const todayTask = tasks.find(t => t.employeeId === currentUser.id && t.date === today);
    const taskValue = todayTask ? todayTask.taskText : "";
    const isLeave = todayTask ? todayTask.status === "leave" : false;
    const hasSubmitted = !!todayTask;
    const totalTasks = myTasks.length, leaveDays = myTasks.filter(t => t.status === "leave").length, presentDays = totalTasks - leaveDays;
    return `
      <div class="glass-panel rounded-3xl shadow-xl p-6 md:p-8 max-w-4xl mx-auto fade-in">
        <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
          <div class="flex items-center gap-3"><img src="${company?.logoDataURL}" class="company-logo" onerror="this.src='https://placehold.co/200x80?text=Logo'"><div><h2 class="text-2xl font-bold">Welcome, ${currentUser.name}</h2><p class="text-gray-500">${company?.name} · ${currentUser.designation || "Employee"}</p><p class="text-xs text-gray-400">${company?.email} | ${company?.address || ""}</p></div></div>
          <div class="flex gap-3">
            <button onclick="showProfileSettings()" class="settings-btn text-gray-600 hover:text-indigo-600 transition text-2xl"><i class="fas fa-cog"></i></button>

          </div>
        </div>

        <h3 class="font-bold text-xl mb-3">My History</h3>
        <div class="overflow-x-auto rounded-xl border bg-white/50 mb-6">
          <table class="w-full text-sm">
            <thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left">Date</th><th class="px-4 py-2 text-left">Task</th><th class="px-4 py-2 text-left">Status</th></tr></thead>
            <tbody>
              ${myTasks.map(tsk => `<tr class="data-row"><td class="px-4 py-2">${tsk.date}</td><td class="px-4 py-2">${tsk.taskText.substring(0,100)}</td><td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${tsk.status==='leave'?'bg-rose-100':'bg-emerald-100'}">${tsk.status==='leave'?'Leave':'Present'}</span></td></tr>`).join('')}
              ${!myTasks.length ? '<tr><td colspan="3" class="text-center py-4">No tasks yet</td>' : ''}
            </tbody>
          </table>
        </div>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="stats-card"><div class="text-2xl font-bold text-indigo-600">${totalTasks}</div><div class="text-xs">Total Tasks</div></div>
          <div class="stats-card"><div class="text-2xl font-bold text-emerald-600">${presentDays}</div><div class="text-xs">Present Days</div></div>
          <div class="stats-card"><div class="text-2xl font-bold text-rose-500">${leaveDays}</div><div class="text-xs">Leave Days</div></div>
        </div>
      </div>
    `;
  }
  function attachEmployeeEvents() {
    const form = document.getElementById("employeeTaskForm");
    if (!form) return;
    document.getElementById("employeeLogoutBtn")?.addEventListener("click", logout);
    const leaveCheck = document.getElementById("leaveCheckbox");
    const taskArea = document.getElementById("taskDesc");
    const toggle = () => { if (leaveCheck.checked) { taskArea.value = "On Leave / Absent — No tasks"; taskArea.disabled = true; } else { if (taskArea.disabled) taskArea.value = ""; taskArea.disabled = false; } };
    leaveCheck?.addEventListener("change", toggle);
    toggle();
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      let text = taskArea.value.trim();
      const date = new Date().toISOString().slice(0,10);
      let status = "present";
      if (leaveCheck.checked) { status = "leave"; if (!text) text = "Official leave"; }
      else if (!text) { alert("Please describe your task or mark leave."); return; }
      saveOrUpdateTask(currentUser.id, date, text, status);
      alert("✅ Task saved!");
    });
  }

  function renderApp() {
    const root = document.getElementById("appRoot");
    if (!currentUser) {
      root.innerHTML = renderLoginScreen();
      attachLoginEvents();
      return;
    }
    if (currentUser.role === "super") { root.innerHTML = renderSuperDashboard(); attachSuperEvents(); return; }
    if (currentUser.role === "admin") { root.innerHTML = renderAdminDashboard(); attachAdminEvents(); return; }
    if (currentUser.role === "employee") { root.innerHTML = renderEmployeeDashboard(); attachEmployeeEvents(); return; }
  }

  loadSuperCredentials();
  loadCompanies();
  loadSession();
  renderApp();
</script>
